name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: actions/configure-pages@v4
      - name: Restore Astro cache
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ hashFiles('src/**', 'public/**', 'astro.config.mjs', 'package-lock.json') }}
          restore-keys: astro-
      - name: Install Japanese fonts for OGP image generation
        run: sudo apt-get install -y fonts-noto-cjk
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
